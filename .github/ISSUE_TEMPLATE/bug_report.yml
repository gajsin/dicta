name: Сообщить об ошибке
description: Воспроизводимая проблема в Dicta
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Что произошло?
      description: Опишите фактическое и ожидаемое поведение.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Как воспроизвести?
      placeholder: |
        1. Открыть…
        2. Нажать…
        3. Увидеть…
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Версия Dicta
      placeholder: 0.2.0
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Версия Windows
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Дополнительные сведения
      description: Скриншоты и логи без API-ключей и других секретов.
